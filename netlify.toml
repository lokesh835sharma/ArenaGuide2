[build]
  # Netlify automatically uses Pipfile to install dependencies.
  publish = "src/static"

[functions]
  included_files = ["src/data/**", "src/static/**"]

[[redirects]]
  from = "/api/stadium"
  to = "/.netlify/functions/stadium"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/static/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
